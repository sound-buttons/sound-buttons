name: Build and Deploy to Github Page

on:
  repository_dispatch:
    types: [update_config]
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  # Gate: the headless test suite must pass before anything is built/deployed.
  # A reusable-workflow call keeps the dependency mechanically real for BOTH
  # the push:master and repository_dispatch:update_config deploy triggers
  # (cross-workflow `needs:` does not exist in GitHub Actions).
  test:
    uses: ./.github/workflows/test.yml

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          # Node 24 LTS (24.16.0), matching the Angular 21 `>=24` engine range used in CI tests.
          node-version: '24.16.0'

      - name: Initialize and checkout submodule to minify branch
        run: |
          git submodule update --init
          cd src/assets/configs
          git checkout minify
          git pull origin minify

      - name: npm build
        run: npm ci && npm run build
        env:
          GA_TRACKING_ID: ${{ secrets.GA_TRACKING_ID }}
          ORIGIN: ${{ secrets.ORIGIN }}
          API: ${{ secrets.API }}
          VERSION: ${{ github.sha }}
          CLARITY_TRACKING_ID: ${{ secrets.CLARITY_TRACKING_ID }}

      - name: copy index.html to 404.html
        run: cp dist/sound-buttons/index.html dist/sound-buttons/404.html

      - name: Add .nojekyll file
        run: touch dist/sound-buttons/.nojekyll

      - name: Add CNAME file
        run: echo 'sound-buttons.click' > dist/sound-buttons/CNAME

      - name: Commit dist to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
          folder: dist/sound-buttons
          single-commit: true
          clean: true

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: web
          path: |
            dist/sound-buttons
          retention-days: 10
